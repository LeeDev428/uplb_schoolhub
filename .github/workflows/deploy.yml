name: Deploy to Production

# ─────────────────────────────────────────────────────────────────────────
# LOCAL WORKFLOW (every time you make changes):
#   1. npm run build
#   2. git add -A && git commit -m "your message" && git push
#   → This Action fires automatically and deploys to production.
#
# REQUIRED GITHUB SECRETS (Settings → Secrets → Actions):
#   SSH_HOST        → 72.61.121.165
#   SSH_PORT        → 65002
#   SSH_USER        → u866511543
#   SSH_PRIVATE_KEY → contents of your ~/.ssh/hostinger_deploy private key
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PHP dependencies (in CI so vendor is rsynced)
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Sync files to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          # --delete removes old files, but we exclude .env, storage, and the
          # storage symlink so they are never wiped on the server.
          switches: >-
            -avz --delete
            --exclude='.env'
            --exclude='.git'
            --exclude='node_modules'
            --exclude='storage/app/'
            --exclude='storage/framework/cache/'
            --exclude='storage/framework/sessions/'
            --exclude='storage/logs/'
            --exclude='public/storage'
          path: ./
          remote_path: /home/u866511543/westerncollege
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Write production .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cat > /home/u866511543/westerncollege/.env << 'ENVEOF'
            APP_NAME="Western Colleges Inc"
            APP_ENV=production
            APP_KEY=${{ secrets.APP_KEY }}
            APP_DEBUG=false
            APP_URL=https://westerncollegesinc.ph

            APP_LOCALE=en
            APP_FALLBACK_LOCALE=en
            APP_FAKER_LOCALE=en_US

            APP_MAINTENANCE_DRIVER=file

            BCRYPT_ROUNDS=12

            LOG_CHANNEL=stack
            LOG_STACK=single
            LOG_DEPRECATIONS_CHANNEL=null
            LOG_LEVEL=error

            DB_CONNECTION=mysql
            DB_HOST=localhost
            DB_PORT=3306
            DB_DATABASE=u866511543_westerncollege
            DB_USERNAME=u866511543_westerncollege
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            SESSION_DRIVER=database
            SESSION_LIFETIME=120
            SESSION_ENCRYPT=false
            SESSION_PATH=/
            SESSION_DOMAIN=null

            BROADCAST_CONNECTION=log
            FILESYSTEM_DISK=local
            QUEUE_CONNECTION=database

            CACHE_STORE=database

            MAIL_MAILER=smtp
            MAIL_SCHEME=null
            MAIL_HOST=smtp.gmail.com
            MAIL_PORT=587
            MAIL_USERNAME=emtechdevelopers@gmail.com
            MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}"
            MAIL_FROM_ADDRESS="emtechdevelopers@gmail.com"
            MAIL_FROM_NAME="Western Colleges Inc"

            VITE_APP_NAME="Western Colleges Inc"
            ENVEOF

      - name: Run post-deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/u866511543/westerncollege

            # Ensure storage symlink exists (ln -sfn is idempotent)
            ln -sfn /home/u866511543/westerncollege/storage/app/public \
                    /home/u866511543/westerncollege/public/storage

            # Correct permissions
            chmod -R 775 storage bootstrap/cache

            # Clear old caches then rebuild
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan cache:clear
            php artisan optimize

            # Run pending migrations
            php artisan migrate --force

            echo "✅ Deployed commit ${{ github.sha }}"