name: Deploy to Production

# ── Local workflow ────────────────────────────────────────────────────────
# 1. Make code changes
# 2. npm run build
# 3. git add -A && git commit -m "..." && git push
# 4. This Action fires → rsync to server → php artisan optimize ✅
#
# Required secrets (already set in your repo):
#   SSH_HOST, SSH_PORT, SSH_USER, SSH_PRIVATE_KEY
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - master

jobs:
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.env' --exclude='storage/app/' --exclude='.git'
          path: ./
          remote_path: /home/u866511543/westerncollege
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Refresh Laravel caches
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/u866511543/westerncollege
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan optimize
            echo "Deployed ${{ github.sha }}"